name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - run: uv python install ${{ matrix.python-version }}
      - run: uv sync --dev
      - run: uv run pytest -v
      - run: uv run ruff check src/

  registry-health:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - run: uv sync
      - name: Validate registry TOML parses
        run: |
          uv run python -c "
          import tomllib
          data = tomllib.load(open('src/gpkg/registry.toml', 'rb'))
          sources = data['sources']
          print(f'{len(sources)} sources loaded')
          for s in sources:
              assert 'package' in s, f'missing package in {s}'
              assert 'type' in s, f'missing type in {s}'
          print('All sources valid')
          "
      - name: Check GitHub repos exist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          uv run python -c "
          import tomllib, httpx, os
          data = tomllib.load(open('src/gpkg/registry.toml', 'rb'))
          token = os.environ.get('GITHUB_TOKEN', '')
          client = httpx.Client(headers={'Authorization': f'Bearer {token}'})
          for s in data['sources']:
              if s.get('type') == 'github' and s.get('repo'):
                  resp = client.head(f'https://api.github.com/repos/{s[\"repo\"]}')
                  status = '  ok' if resp.status_code == 200 else 'DEAD'
                  print(f'  {status}  {s[\"repo\"]:50s}  ({s[\"package\"]})')
          "
