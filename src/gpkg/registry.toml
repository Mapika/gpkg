#  TRITON (Windows)
# ════════════════════════════════════════════════════════════════════

# Triton on Linux comes from PyPI. On Windows, woct0rdho provides builds.
# These are NOT CUDA/torch-versioned — they're pure Python ABI.
# Included here for completeness; the tool can't match on cuda/torch.
# Install: pip install https://github.com/woct0rdho/triton-windows/releases/download/v3.2.0-windows.post10/triton-3.2.0-cp312-cp312-win_amd64.whl

