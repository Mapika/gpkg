# ╔══════════════════════════════════════════════════════════════════╗
# ║  gpkg registry — community-maintained CUDA wheel sources     ║
# ║                                                                 ║
# ║  Adding a new source: copy a [[sources]] block, change fields,  ║
# ║  open a PR.  The tool searches ALL sources and picks the best.  ║
# ╚══════════════════════════════════════════════════════════════════╝
#
# Wheel name template placeholders (auto-expanded to regex):
#   {version}   — package version        2.8.3, 1.6.1.post4
#   {cuda}      — CUDA tag               130, 12, 126 (see cuda_style)
#   {torch}     — PyTorch version         2.11, 2.7 (see torch_format)
#   {pytag}     — Python ABI tag          cp312-cp312, cp39-abi3
#   {platform}  — OS+arch tag             linux_x86_64, win_amd64
#   {abi}       — C++11 ABI flag          TRUE or FALSE
#   {hash}      — optional git hash       gite2743ab (can be absent)
#
# cuda_style:
#   "full"  — cu130 = CUDA 13.0,  cu126 = CUDA 12.6  (3 digits)
#   "short" — cu13  = CUDA 13.x,  cu12  = CUDA 12.x  (major only)
#
# torch_format (optional, default "minor"):
#   "minor"  — 2.11, 2.10, 2.7   (major.minor, default)
#   "packed" — 2110, 2100, 280    (no dots, includes patch as 0)
#   "full"   — 2.11.0, 2.10.0    (major.minor.patch)


# ════════════════════════════════════════════════════════════════════
#  FLASH ATTENTION 2
# ════════════════════════════════════════════════════════════════════

[[sources]]
package      = "flash-attn"
description  = "Flash Attention 2 — mjun0812 prebuilt (Linux + Windows)"
type         = "github"
repo         = "mjun0812/flash-attention-prebuild-wheels"
wheel_name   = "flash_attn-{version}+cu{cuda}torch{torch}-{pytag}-{platform}.whl"
cuda_style   = "full"
scan_tags    = 8

[[sources]]
package      = "flash-attn"
description  = "Flash Attention 2 — Dao-AILab official"
type         = "github"
repo         = "Dao-AILab/flash-attention"
wheel_name   = "flash_attn-{version}+cu{cuda}torch{torch}cxx11abi{abi}-{pytag}-{platform}.whl"
cuda_style   = "short"
has_abi      = true
scan_tags    = 3


# ════════════════════════════════════════════════════════════════════
#  FLASH ATTENTION 3 (Hopper SM90+ only)
# ════════════════════════════════════════════════════════════════════

[[sources]]
package      = "flash-attn-3"
description  = "Flash Attention 3 — mjun0812 prebuilt (Linux + Windows)"
type         = "github"
repo         = "mjun0812/flash-attention-prebuild-wheels"
wheel_name   = "flash_attn_3-{version}+cu{cuda}torch{torch}{hash}-{pytag}-{platform}.whl"
cuda_style   = "full"
scan_tags    = 8

# windreamer provides a pip --find-links index (not GitHub release assets)
# Uses nonstandard naming with date+hash in local version — {_} wildcard matches those
[[sources]]
package      = "flash-attn-3"
description  = "Flash Attention 3 — windreamer find-links index"
type         = "find-links"
url_template = "https://windreamer.github.io/flash-attention3-wheels/cu{cuda}_torch{torch}"
wheel_name   = "flash_attn_3-{version}+{_}.cu{cuda}torch{torch}cxx11abi{_}-{pytag}-{platform}.whl"
cuda_style   = "full"
torch_format = "packed"


