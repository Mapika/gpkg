# ════════════════════════════════════════════════════════════════════
#  NOTES ON PACKAGES THAT DON'T NEED THIS TOOL
# ════════════════════════════════════════════════════════════════════
#
# xformers:
#   Published on PyPI. Since v0.0.34 uses PyTorch stable ABI (one wheel
#   for 2.10+). Just: pip install xformers
#   For older versions: pip install xformers --index-url https://download.pytorch.org/whl/cu126
#
# bitsandbytes:
#   Published on PyPI as platform-specific but CUDA-agnostic wheels
#   (bundles all CUDA versions in one .so). Just: pip install bitsandbytes
#
# deepspeed:
#   Published on PyPI. Compiles JIT at runtime, no CUDA-versioned wheels.
#   pip install deepspeed
#
# flash-linear-attention (fla):
#   Pure Python + Triton. No CUDA compilation needed.
#   pip install flash-linear-attention
#
# megablocks:
#   Published on PyPI as source dist. Requires grouped-gemm for best perf.
#   pip install megablocks[gg]
#
# transformer-engine:
#   NVIDIA ships wheels via their index.
#   pip install transformer-engine --index-url https://developer.download.nvidia.com/compute/transformer-engine/whl/
#
# torch-scatter, torch-sparse, torch-cluster, torch-spline-conv:
#   PyG (PyTorch Geometric) team hosts wheels via find-links:
#   pip install torch-scatter -f https://data.pyg.org/whl/torch-{torch}+{cuda}.html
#   e.g. https://data.pyg.org/whl/torch-2.11.0+cu130.html


# ════════════════════════════════════════════════════════════════════
#  HOW TO ADD YOUR OWN SOURCE
# ════════════════════════════════════════════════════════════════════
#
# 1. Copy any [[sources]] block above
# 2. Change `package` to the pip package name
# 3. Change `repo` to your GitHub owner/repo
# 4. Change `wheel_name` to match your filenames, using {placeholders}
# 5. Set `cuda_style` to "full" or "short" depending on your naming
# 6. Set `has_abi = true` if your filenames contain cxx11abi{TRUE/FALSE}
# 7. Set `torch_format` if you use non-standard torch versioning
# 8. Open a PR!
#
# Example:
#
# [[sources]]
# package      = "causal-conv1d"
# description  = "causal-conv1d — yourname's torch 2.11 builds"
# type         = "github"
# repo         = "yourname/causal-conv1d-torch211"
# wheel_name   = "causal_conv1d-{version}+cu{cuda}torch{torch}-{pytag}-{platform}.whl"
# cuda_style   = "full"
# scan_tags    = 3
